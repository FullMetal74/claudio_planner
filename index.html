<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnityDiagram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <div id="toolbar-left">
      <span id="app-name">UnityDiagram</span>
    </div>
    <div id="toolbar-center">
      <span id="project-name">No project loaded</span>
    </div>
    <div id="toolbar-right">
      <span id="save-indicator"></span>
      <button id="btn-todo" class="toolbar-btn">TODO</button>
      <button id="btn-save" class="toolbar-btn">Save</button>
      <button id="btn-export" class="toolbar-btn">Export</button>
      <button id="btn-import" class="toolbar-btn">Import</button>
      <button id="btn-projects" class="toolbar-btn">Projects</button>
      <span id="zoom-display">100%</span>
      <button id="btn-fit" class="toolbar-btn">Fit</button>
    </div>
  </div>

  <!-- Main area -->
  <div id="main">
    <!-- Canvas -->
    <canvas id="diagram-canvas"></canvas>

    <!-- Node Editor Panel (left side overlay) -->
    <div id="node-editor" class="hidden">
      <div id="node-editor-top">
        <div id="node-editor-topbar">
          <span id="node-editor-label">Edit Node</span>
          <button id="node-editor-close">✕</button>
        </div>
        <div id="node-editor-controls"></div>
      </div>
      <div id="node-editor-bottom">
        <label class="panel-label" style="margin-bottom:6px;display:block">Description</label>
        <textarea id="node-editor-desc" class="panel-textarea node-desc-area" placeholder="Node description…"></textarea>
        <div id="node-editor-actions"></div>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="hidden">
    <ul id="context-menu-list"></ul>
  </div>

  <!-- Connection Type Popup -->
  <div id="connection-popup" class="hidden">
    <div id="connection-popup-inner">
      <p>Connection type?</p>
      <button data-type="hard" class="conn-btn">Hard</button>
      <button data-type="assign" class="conn-btn">Assign</button>
      <button data-type="signal" class="conn-btn">Signal</button>
      <button id="conn-cancel">Cancel</button>
    </div>
  </div>

  <!-- Startup Modal -->
  <div id="startup-modal">
    <div id="startup-inner">
      <h1>UnityDiagram</h1>
      <p id="startup-subtitle">Select a project or create a new one</p>
      <div id="project-grid"></div>
    </div>
  </div>

  <!-- TODO Modal -->
  <div id="todo-modal" class="hidden">
    <div id="todo-box">
      <div id="todo-header">
        <span id="todo-title">TODO LIST</span>
        <button id="todo-close">✕</button>
      </div>
      <div id="todo-add-row">
        <input id="todo-input" type="text" placeholder="Add a task…" autocomplete="off" />
        <button id="todo-add-btn">Add</button>
      </div>
      <div id="todo-list-wrap">
        <ul id="todo-list"></ul>
      </div>
    </div>
  </div>

  <script src="src/app.js"></script>
</body>
</html>
